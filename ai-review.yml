name: AI Code Review

on:
  push:
    branches:
      - "*"

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt

      - name: Run AI Review
        run: python review_runner.py
